<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Portal - City OF Shapes</title>
    <style>
        :root {
            --primary: #FFD700; /* Yellow */
            --bg: #FFFFFF;      /* White */
            --text: #1A1A1A;    /* Black */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary);
            padding: 2rem;
            text-align: center;
            border-bottom: 4px solid var(--text);
        }

        nav {
            background-color: var(--text);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 2-Column Configuration */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            border: 3px solid var(--text);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            background: white;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 8px 8px 0px var(--text);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            background: #000;
        }

        .content {
            padding: 20px;
            border-top: 3px solid var(--text);
        }

        h2 { margin-bottom: 20px; text-transform: uppercase; }
        h3 { margin-top: 0; color: #000; }
        p { line-height: 1.5; color: #333; margin-bottom: 0; }

        /* Responsive: Stack to 1 column on mobile */
        @media (max-width: 768px) {
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE CITY OF SHAPES TINGYS</h1>
        <p>STUDENT WORK FOR THE BIGGEST PROJECT IN 4TH GRADE.</p>
    </header>

    <nav>
        <a href="science_pages.html">Go to Science Reports →</a>
        <a href="index.html">Go to Book Reports →</a>
    </nav>

    <div class="container">
        <h2>CITY OF SHAPES</h2>
        <div class="video-grid">
            
            <div class="card">
                <iframe src="assets/cityofshapes/Las_vegas.mp4"></iframe>
                <div class="content">
                    <h3>ZAKI AND IAN'S CITY, LAS VEGAS, IS NOW OPEN</h3>
                    <p>LAS VEGAS 2.0</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
